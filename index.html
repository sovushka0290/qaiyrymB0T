<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QAIYRYM Compass App</title>
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #70C1FF; 
            --accent: #FFB7D5; 
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #2D3436;
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f7ff;
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Анимированный фон */
        .bg-blobs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at top right, #e3f2fd, #ffffff);
            overflow: hidden;
        }
        .blob {
            position: absolute; width: 400px; height: 400px; background: var(--primary);
            filter: blur(100px); border-radius: 50%; opacity: 0.3; animation: float 15s infinite alternate;
        }

        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }

        .app-container {
            width: 100%; max-width: 480px; height: 100vh;
            position: relative; display: flex; flex-direction: column;
        }

        /* HEADER */
        .header { padding: 25px 20px; display: flex; align-items: center; z-index: 10; }
        
        .logo-container { width: 55px; height: 55px; position: relative; }
        .logo-img { 
            width: 100%; height: 100%; border-radius: 50%; background: white; 
            box-shadow: var(--shadow); border: 2px solid white; 
        }
        .logo-ring {
            position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 2px dashed var(--primary); border-radius: 50%; animation: rotate 12s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .user-info { margin-left: 15px; }
        .user-info h2 { font-size: 13px; font-weight: 400; color: #7f8c8d; }
        .user-info p { font-family: 'Montserrat'; font-size: 18px; font-weight: 800; }

        /* CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 0 20px 100px; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow);
        }

        .card-tag {
            display: inline-block; padding: 4px 12px; background: #fff;
            border-radius: 10px; font-size: 10px; font-weight: 800;
            color: var(--primary); margin-bottom: 10px; text-transform: uppercase;
        }


        .request-card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
        }
        .request-title { color: #111827; font-family: 'Montserrat'; font-size: 18px; font-weight: 800; line-height: 1.25; }
        .request-address { color: #6b7280; font-size: 12px; margin-top: 6px; font-weight: 500; }
        .request-btn {
            width: 100%; margin-top: 14px; padding: 12px; border: 0; border-radius: 16px;
            font-size: 12px; font-weight: 800; color: #fff; background: #111827; cursor: pointer;
            transition: transform .12s ease;
        }
        .request-btn:active { transform: scale(0.97); }
        .profile-stat { display:flex; justify-content:space-between; margin-top:10px; padding:10px 12px; background:#f8fafc; border-radius:12px; }
        .geo-verified { color:#16a34a; font-weight:700; }

        /* SKELETON LOADER */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* BOTTOM NAV */
        .bottom-nav {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            height: 75px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px); border-radius: 25px;
            display: flex; align-items: center; justify-content: space-around;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #bdc3c7; cursor: pointer; transition: 0.3s; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 2px; transition: 0.3s; }
        .nav-item.active .nav-icon { transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob" style="top: -100px; right: -100px;"></div>
        <div class="blob" style="bottom: -100px; left: -100px; background: var(--accent);"></div>
    </div>

    <div class="app-container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-ring"></div>
                <!-- Логотип из твоих данных -->
                <img src="https://i.ibb.co/LzNfX2Z/logo.jpg" class="logo-img" id="userAvatar">
            </div>
            <div class="user-info">
                <h2>Волонтёр QAIYRYM</h2>
                <p id="userName">Загрузка...</p>
            </div>
        </header>

        <main class="content" id="mainContent">
            <!-- HOME PAGE -->
            <div id="home-page" class="page active">
                <div class="glass-card" style="background: linear-gradient(135deg, var(--primary), #85ccff); color: white;">
                    <h3 id="userStatus">Статус: Загрузка...</h3>
                    <div style="margin-top: 10px; background: rgba(255,255,255,0.2); height: 6px; border-radius: 3px;">
                        <div id="userProgress" style="width: 0%; height: 100%; background: white; border-radius: 3px; transition: 1s;"></div>
                    </div>
                    <p style="font-size: 11px; margin-top: 8px; opacity: 0.9;">Твой прогресс в системе Компаса</p>
                </div>

                <h3 style="margin: 20px 0 15px; font-family: 'Montserrat';">Заявки из Актобе</h3>
                
                <!-- Сюда JavaScript будет вставлять заявки из Google Sheets -->
                <div id="requestsList">
                    <div class="glass-card skeleton" style="height: 120px;"></div>
                    <div class="glass-card skeleton" style="height: 120px;"></div>
                </div>
            </div>

            <!-- PROFILE PAGE -->
            <div id="profile-page" class="page">
                <div class="glass-card" id="profileDetails">
                    <!-- Данные из Telegram и сервера -->
                </div>
            </div>
        </main>

        <!-- NAV -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('home-page', this)">
                <span class="nav-icon">🏠</span><span>Главная</span>
            </div>
            <div class="nav-item" onclick="switchPage('profile-page', this)">
                <span class="nav-icon">👤</span><span>Профиль</span>
            </div>
            <div class="nav-item" onclick="Telegram.WebApp.close()">
                <span class="nav-icon">🚪</span><span>Выйти</span>
            </div>
        </nav>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        // Настройка цветов темы Telegram (по желанию)
        document.body.style.backgroundColor = tg.themeParams.bg_color || "#f0f7ff";

        // 1. Получаем данные пользователя из Telegram
        const user = tg.initDataUnsafe.user || { first_name: "Гость", id: "0", username: "guest" };
        document.getElementById('userName').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
        if (user.photo_url) document.getElementById('userAvatar').src = user.photo_url;

        // 2. Функция для загрузки данных с сервера
        async function loadData() {
            try {
                // Загружаем данные пользователя с сервера (роль из БД)
                const userResponse = await fetch(`/api/user/${user.id}`);
                const userData = await userResponse.json();
                
                // Обновляем статус и прогресс на основе роли
                const role = userData.role || "GUEST";
                const active = role === "VOLUNTEER" || role === "COORDINATOR" || role === "WAREHOUSE_ADMIN";
                document.getElementById('userStatus').innerText = `Статус: ${active ? "Активный" : "Гость"}`;
                document.getElementById('userProgress').style.width = active ? "65%" : "0%";

                // Загружаем заявки из Google Sheets через сервер
                const requestsResponse = await fetch(`/api/requests?userId=${user.id}`);
                const requests = await requestsResponse.json();

                const list = document.getElementById('requestsList');
                list.innerHTML = ""; // Убираем скелетоны

                requests.forEach(req => {
                    const action = req.can_claim ? "ВЗЯТЬ ЗАДАНИЕ" : "ПРЕДЛОЖИТЬ КОМАНДЕ";
                    list.innerHTML += `
                        <div class="request-card">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                                <span class="card-tag" style="background:#f5f3ff;color:#7c3aed;">${req.district || 'Район не указан'}</span>
                            </div>
                            <h4 class="request-title">${req.items_list || 'Заявка без описания'}</h4>
                            <p class="request-address">${req.address || 'Адрес уточняется'}</p>
                            <button class="request-btn">${action}</button>
                        </div>
                    `;
                });

                // Заполняем профиль данными из TG + роль из сервера
                document.getElementById('profileDetails').innerHTML = `
                    <h3 style="margin-bottom: 10px;">Данные системы</h3>
                    <p><b>Telegram ID:</b> ${user.id}</p>
                    <p><b>Username:</b> @${user.username || 'не указан'}</p>
                    <p><b>Имя:</b> ${user.first_name} ${user.last_name || ''}</p>
                    <div class="profile-stat"><span>Роль</span><b>${userData.role || 'GUEST'}</b></div>
                    <div class="profile-stat"><span>Выполнено</span><b>${userData.tasks_completed ?? 0}</b></div>
                    <div class="profile-stat"><span>Рейтинг SBT</span><b>${userData.sbt_rating ?? 0}</b></div>
                    <div class="profile-stat"><span>Гео-статус</span><b class="geo-verified">✅ Verified by GPS</b></div>
                `;

            } catch (e) {
                console.error("Ошибка загрузки данных", e);
                document.getElementById('userStatus').innerText = "Ошибка загрузки";
                document.getElementById('requestsList').innerHTML = "<p>Ошибка загрузки заявок. Попробуйте позже.</p>";
                document.getElementById('profileDetails').innerHTML = "<p>Ошибка загрузки профиля.</p>";
            }
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(5);
        }

        // Запуск
        loadData();
        tg.ready();
    </script>
</body>
</html>
